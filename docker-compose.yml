services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: didududadi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend/DiDuDuaDi.API
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=didududadi;Username=postgres;Password=postgres"
      OpenAI__ApiKey: "${OPENAI_API_KEY}"
      OpenAI__Model: "gpt-4o-mini"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      VITE_GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
    depends_on:
      - backend

volumes:
  pgdata:
