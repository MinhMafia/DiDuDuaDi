services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: didududi
      MYSQL_ROOT_PASSWORD: my-secret-pw
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  backend:
    build: ./backend/DiDuDuaDi.API
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=didududi;User=root;Password=my-secret-pw;SslMode=None;"
      OpenAI__ApiKey: "${OPENAI_API_KEY}"
      OpenAI__Model: "gpt-4o-mini"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      VITE_GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
    depends_on:
      - backend

volumes:
  mysqldata:
